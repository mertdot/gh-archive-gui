name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            asset_name: gh-archive-gui-linux
          - os: windows-latest
            asset_name: gh-archive-gui-windows.exe
          - os: macos-latest
            asset_name: gh-archive-gui-macos

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.8'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build executable
      run: |
        pyinstaller --onefile --windowed gh-archive.py

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.asset_name }}
        path: dist/gh-archive*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          artifacts/gh-archive-gui-linux/gh-archive
          artifacts/gh-archive-gui-windows.exe/gh-archive.exe
          artifacts/gh-archive-gui-macos/gh-archive
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}